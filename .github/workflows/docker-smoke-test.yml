name: Docker Smoke Test

# Pulls the published Docker image from Docker Hub and runs a one-shot
# inference check on every push, to verify the container and model work end-to-end.
on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
    - name: Pull Docker Image from Docker Hub
      run: docker pull sharvanvittala/mlops_assignment_3:latest

    - name: Run Inference Smoke Test
      run: |
        docker run --rm \
          -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
          -e HF_HUB_DISABLE_SYMLINKS_WARNING=1 \
          -e TRANSFORMERS_VERBOSITY=error \
          -e HF_HUB_VERBOSITY=error \
          sharvanvittala/mlops_assignment_3:latest \
          python src/inference.py
